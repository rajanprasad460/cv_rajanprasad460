name: Update User Data

on:
  schedule:
      - cron: "0 6 * * *"   # Every day at 6:00 AM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

 #     - name: Run scholar
 #       run: python scholar.py

      - name: Run scopus
        run: python scopus.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add scopus.json scholar.json
          git commit -m "Updated User Scopus and Scholar data" || echo "No changes"
          git push